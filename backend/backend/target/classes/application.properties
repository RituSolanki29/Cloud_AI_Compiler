# ── Database (Amazon RDS PostgreSQL) ──────────────────────────
# In production, these values come from Kubernetes secrets / environment variables
spring.datasource.url=jdbc:postgresql://localhost:5432/smartcloud
spring.datasource.username=postgres
spring.datasource.password=@nixnbunny29
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
# update = auto-creates/alters tables on startup (use 'validate' in production)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

