# ── Database (Amazon RDS PostgreSQL) ──────────────────────────
# In production, these values come from Kubernetes secrets / environment variables
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/smartcloud}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:@nixnbunny29}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
# update = auto-creates/alters tables on startup (use 'validate' in production)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── JWT Security ───────────────────────────────────────────────
# Secret key for signing JWT tokens (must be 256-bit minimum)
jwt.secret=vKZWc2BdjDTVAAuLcGibt4FNLas0pSk8e1EpzqBjnRy6Z5k8hX8zO1RzU2FGdnkq
# Token expires after 24 hours (in milliseconds)
jwt.expiration=86400000

# ── OpenAI API ─────────────────────────────────────────────────
openai.api.key=${OPENAI_API_KEY}
openai.model=llama-3.3-70b-versatile
openai.api.url=https://api.groq.com/openai/v1/chat/completions

# ── AWS S3 ─────────────────────────────────────────────────────
aws.s3.bucket=${S3_BUCKET:smartcloud-outputs}
aws.region=${AWS_REGION:ap-south-1}

# ── AWS CloudWatch ─────────────────────────────────────────────
aws.cloudwatch.log-group=${CLOUDWATCH_LOG_GROUP:/smartcloud/backend-logs}
aws.cloudwatch.namespace=${CLOUDWATCH_NAMESPACE:SmartCloud/SystemMetrics}

# ── Code Execution ─────────────────────────────────────────────
# Max time (seconds) a Docker container can run before being killed
execution.timeout=10
# Max memory per execution container
execution.memory.limit=256m
# Max CPU per execution container
execution.cpu.limit=0.5

# ── Server ─────────────────────────────────────────────────────
server.port=8082

# ── Logging ────────────────────────────────────────────────────
logging.level.com.smartcloud=DEBUG
logging.level.org.springframework.security=WARN
